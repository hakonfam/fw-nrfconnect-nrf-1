CONFIG_IS_SECURE_BOOTLOADER=y
CONFIG_BOOT_BANNER=n # Need this to turn off PRINTK (the bootlader has its own)
CONFIG_PRINTK=n
CONFIG_KERNEL=n
CONFIG_BT=n
CONFIG_BT_CTLR=n
CONFIG_UART_NRFX=n
CONFIG_GPIO=n
CONFIG_SYS_CLOCK_EXISTS=n
CONFIG_CLOCK_CONTROL=n
CONFIG_GEN_ISR_TABLES=n
CONFIG_DEBUG_OPTIMIZATIONS=y

# Bare metal options
CONFIG_ARM_NMI=n
CONFIG_ARM_SCB=n
CONFIG_SWAP=n
CONFIG_IRQ_MANAGE=n
CONFIG_THREAD=n
CONFIG_CPU_IDLE=n
CONFIG_FATAL=n
CONFIG_ARM_EXC_EXIT=n
